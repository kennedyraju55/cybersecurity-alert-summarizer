    <text x="140" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Auto-detect IPs, domains,</text>
    <text x="140" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">hashes, URLs, file paths</text>

