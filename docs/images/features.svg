      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <!-- Card 1 -->
  <rect x="20" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#e94560" stroke-width="1.5" opacity="0.95"/>
